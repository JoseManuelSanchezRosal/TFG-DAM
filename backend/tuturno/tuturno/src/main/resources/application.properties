spring.application.name=tuturno

# --- CONEXIÓN DOCKER ---
spring.datasource.url=jdbc:postgresql://localhost:5432/tuturno_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
server.port=8082
# Clave JWT de 256+ bits codificada en Base64
jwt.secret=c2VjcmV0LWtleS1kZWJlcnNlci1tdXktbGFyZ28tcGFyYS1xdWUtc2VhLXNlZ3Vybw==

# --- TUTURNO SCHEDULE SETTINGS ---
# Business hours for Tue-Fri
tuturno.schedule.weekday.start=10:00
tuturno.schedule.weekday.end=19:00
# Business hours for Saturday
tuturno.schedule.saturday.start=10:00
tuturno.schedule.saturday.end=14:00
# Preparation time added to each service (in minutes)
tuturno.schedule.preparation-time-minutes=15